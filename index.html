<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Ethos101's Astronomy Gallery</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1, h2 {
            text-align: center;
        }
        .header {
            padding: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to Ethos101's Astronomy Gallery</h1>
        <h2>Explore stunning images of the cosmos.</h2>
    </div>
    <div class="gallery">
        <img src="placeholder1.jpg" alt="Placeholder Image 1">
        <img src="placeholder2.jpg" alt="Placeholder Image 2">
        <img src="placeholder3.jpg" alt="Placeholder Image 3">
        <img src="placeholder4.jpg" alt="Placeholder Image 4">
    </div>
    <footer>
        <p>&copy; 2026 Ethos101. All rights reserved.</p>
    </footer>
</body>
</html>
